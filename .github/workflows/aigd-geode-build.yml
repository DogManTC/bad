name: Build AiGD Geode Probe

on:
  workflow_dispatch:
  push:
    paths:
      - "aigd-geode-probe-build/**"
      - ".github/workflows/aigd-geode-build.yml"
  pull_request:
    paths:
      - "aigd-geode-probe-build/**"
      - ".github/workflows/aigd-geode-build.yml"

jobs:
  build-win64:
    name: Build Win64 .geode
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract and patch uploaded source bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path work -Force | Out-Null
          $bundle = "aigd-geode-probe-build/aigd-geode-probe-source.tar.gz.b64"
          Write-Host "Using source bundle: $bundle"
          $b64 = Get-Content -Raw $bundle
          $clean = $b64 -replace "\s", ""
          [IO.File]::WriteAllBytes("work/source.tar.gz", [Convert]::FromBase64String($clean))
          tar -xzf "work/source.tar.gz" -C "work"
          $cmake = "work/aigd-geode-probe/CMakeLists.txt"
          $text = Get-Content -Raw $cmake
          $text = $text.Replace(" PRIVATE ws2_32", " ws2_32")
          Set-Content -NoNewline -Path $cmake -Value $text
          Write-Host "Patched CMakeLists target_link_libraries signature."
          Get-Content $cmake
          Get-ChildItem -Recurse "work/aigd-geode-probe" | Select-Object -First 50

      - name: Build Geode mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          path: work/aigd-geode-probe
          target: Win64
          sdk: latest
          cli: latest
          build-config: RelWithDebInfo
          export-pdb: true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aigd-geode-probe-win64
          path: |
            ${{ steps.build.outputs.build-output }}
            work/aigd-geode-probe/build/**/*.geode
            work/aigd-geode-probe/build/**/*.dll
            work/aigd-geode-probe/build/**/*.pdb
            work/aigd-geode-probe/build/**/*.log
          if-no-files-found: warn
