name: Build AiGD Geode Probe

on:
  workflow_dispatch:
  push:
    paths:
      - "aigd-geode-probe-build/**"
      - ".github/workflows/aigd-geode-build.yml"
  pull_request:
    paths:
      - "aigd-geode-probe-build/**"
      - ".github/workflows/aigd-geode-build.yml"

jobs:
  build-win64:
    name: Build Win64 .geode from raw source bundle
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract raw source bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path work -Force | Out-Null
          $chunkDir = "aigd-geode-probe-build/source-chunks"
          if (Test-Path $chunkDir) {
            Write-Host "Using chunked raw source bundle: $chunkDir"
            $clean = ""
            Get-ChildItem $chunkDir -Filter "*.b64" | Sort-Object Name | ForEach-Object {
              $clean += (Get-Content -Raw $_.FullName) -replace "\s", ""
            }
            [IO.File]::WriteAllBytes("work/source.tar.gz", [Convert]::FromBase64String($clean))
          }
          else {
            $bundle = "aigd-geode-probe-build/aigd-geode-probe-source-alpha021.tar.gz.b64"
            if (!(Test-Path $bundle)) {
              $bundle = "aigd-geode-probe-build/aigd-geode-probe-source.tar.gz.b64"
            }
            Write-Host "Using raw source bundle: $bundle"
            $b64 = Get-Content -Raw $bundle
            $clean = $b64 -replace "\s", ""
            [IO.File]::WriteAllBytes("work/source.tar.gz", [Convert]::FromBase64String($clean))
          }
          tar -xzf "work/source.tar.gz" -C "work"

      - name: Standardize source for reproducible Geode build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./aigd-geode-probe-build/standardize-aigd-source.ps1 -SourceDir "work/aigd-geode-probe" -GeodeVersion "5.7.1"
          Write-Host "--- normalized mod.json ---"
          Get-Content "work/aigd-geode-probe/mod.json"
          Write-Host "--- normalized CMakeLists.txt ---"
          Get-Content "work/aigd-geode-probe/CMakeLists.txt"

      - name: Build Geode mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          path: work/aigd-geode-probe
          target: Win64
          sdk: given
          cli: latest
          build-config: RelWithDebInfo
          export-pdb: true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aigd-geode-probe-win64
          path: |
            ${{ steps.build.outputs.build-output }}
            work/aigd-geode-probe/build/**/*.geode
            work/aigd-geode-probe/build/**/*.dll
            work/aigd-geode-probe/build/**/*.pdb
            work/aigd-geode-probe/build/**/*.log
          if-no-files-found: error
